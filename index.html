<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Ultra Glass UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">

  <h2>Welcome</h2>
  <p>Balance: <span id="balance">100</span> £</p>

  <!-- 🏀 Basketball -->
  <div class="card">
    <h2>🏀 Swipe Basketball</h2>
    <p>Entry: 40 £ | Win: 80 £</p>
    <button onclick="startBasketballGame()">Play</button>

    <canvas id="basketballCanvas" width="300" height="400" style="display:none;"></canvas>
    <p id="basketStatus"></p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
